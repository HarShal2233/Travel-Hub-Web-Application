version: "3.8"

services:
  server:
    build:
      context: .
    environment:
      NODE_ENV: production
    ports:
      - 4173:4173


  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
